# Gatling Configuration
gatling {
  data {
    writers = ["console", "file"]
    reader = "file"
    directory = "results"
  }
  core {
    defaultCharset = "utf-8"
    timeOut {
      simulation = 8640000
    }
  }
  charting {
    noReports = false
    maxPlotsSamples = 10000
    indicators {
      lowerBound = 800
      higherBound = 95000
      percentile1 = 50
      percentile2 = 75
      percentile3 = 95
      percentile4 = 99
    }
  }
  http {
    engine = "netty"
    connectionTimeout = 60000
    requestTimeout = 60000
  }
}
